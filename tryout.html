    document.getElementById('flagTxt').textContent = flagged[idx] ? 'Hapus Tanda' : 'Tandai Ragu';

    document.getElementById('btnPrev').disabled = idx===0;
    const btnNext = document.getElementById('btnNext');
    if (idx===109) {
      btnNext.textContent = 'Submit ✓';
      btnNext.onclick = konfirmasiSubmit;
      btnNext.className = 'flex items-center gap-2 px-5 py-3 rounded-xl bg-green-600 text-white font-semibold text-sm hover:bg-green-700 transition shadow-sm';
    } else {
      btnNext.textContent = 'Selanjutnya →';
      btnNext.onclick = goNext;
      btnNext.className = 'flex items-center gap-2 px-5 py-3 rounded-xl bg-primary-600 text-white font-semibold text-sm hover:bg-primary-700 transition shadow-sm';
    }

    const answeredCount = jawaban.filter(j=>j!==null).length;
    document.getElementById('progBar').style.width = (answeredCount/110*100)+'%';
    document.getElementById('answeredCount').textContent = answeredCount;
    updateNavGrid();
  }

  function selectAnswer(optIdx) { jawaban[currentQ]=optIdx; renderQ(currentQ); }
  function toggleFlag() { flagged[currentQ]=!flagged[currentQ]; renderQ(currentQ); }
  function goPrev() { if(currentQ>0){ currentQ--; renderQ(currentQ); } }
  function goNext() { if(currentQ<109){ currentQ++; renderQ(currentQ); } else konfirmasiSubmit(); }
  function jumpTo(idx) { currentQ=idx; renderQ(currentQ); }

  function updateNavGrid() {
    [['Twk',0,30],['Tiu',30,65],['Tkp',65,110]].forEach(([kat,s,e]) => {
      const el = document.getElementById('nav'+kat);
      if(!el) return;
      let html='';
      for(let i=s;i<e;i++){
        let cls='nav-btn empty';
        if(jawaban[i]!==null) cls='nav-btn answered';
        if(flagged[i]) cls='nav-btn flagged';
        if(i===currentQ) cls+=' current';
        html+=`<button onclick="jumpTo(${i})" class="${cls}">${i+1}</button>`;
      }
      el.innerHTML=html;
    });
  }

  function startTimer() {
    timerInterval=setInterval(()=>{
      timeLeft--;
      const m=Math.floor(timeLeft/60), s=timeLeft%60;
      document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const box=document.getElementById('timerBox');
      if(timeLeft<=300){
        box.className='flex items-center gap-2 px-4 py-2 rounded-xl bg-red-100 border border-red-300 animate-pulse';
        document.getElementById('timerDisplay').className='font-black text-red-600 text-base tabular-nums';
      } else if(timeLeft<=600){
        box.className='flex items-center gap-2 px-4 py-2 rounded-xl bg-amber-50 border border-amber-200';
        document.getElementById('timerDisplay').className='font-black text-amber-600 text-base tabular-nums';
      }
      if(timeLeft<=0){ clearInterval(timerInterval); doSubmit(); }
    },1000);
  }

  function konfirmasiSubmit() {
    const answered=jawaban.filter(j=>j!==null).length;
    const ragu=flagged.filter(Boolean).length;
    document.getElementById('cntDijawab').textContent=answered;
    document.getElementById('cntRagu').textContent=ragu;
    document.getElementById('cntBelum').textContent=110-answered;
    document.getElementById('submitModal').classList.remove('hidden');
  }

  function closeSubmitModal() { document.getElementById('submitModal').classList.add('hidden'); }

  function doSubmit() {
    clearInterval(timerInterval);
    closeSubmitModal();
    let twk=0, tiu=0, tkp=0, twkBenar=0, tiuBenar=0;
    soalDB.forEach((s,i)=>{
      const ans=jawaban[i];
      if(s.tipe==='TWK'){ if(ans===s.benar){twk+=5; twkBenar++;} }
      else if(s.tipe==='TIU'){ if(ans===s.benar){tiu+=5; tiuBenar++;} }
      else if(s.tipe==='TKP'){ tkp += (ans!==null && s.nilai) ? s.nilai[ans] : 1; }
    });
    const result={paket:paketNama, tanggal:new Date().toISOString(), twk, tiu, tkp, total:twk+tiu+tkp, twkBenar, tiuBenar, soal:soalDB, jawaban};
    localStorage.setItem('skorin_last_result', JSON.stringify(result));
    const history=JSON.parse(localStorage.getItem('skorin_history')||'[]');
    history.push({paket:paketNama, tanggal:result.tanggal, twk, tiu, tkp, total:result.total});
    if(history.length>20) history.shift();
    localStorage.setItem('skorin_history', JSON.stringify(history));
    window.location.href='hasil.html';
  }

  document.addEventListener('paste', e=>e.preventDefault());
  document.addEventListener('contextmenu', e=>e.preventDefault());

  renderQ(0);
  startTimer();
</script>
</body>
</html>

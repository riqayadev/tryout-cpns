<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Materi Belajar – SkorinCPNS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#eff6ff',100:'#dbeafe',600:'#2563eb',700:'#1d4ed8'}},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="font-sans antialiased bg-gray-50">

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-gray-900 flex flex-col z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
  <div class="flex items-center gap-3 px-5 h-16 border-b border-white/10 flex-shrink-0">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0"><svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
    <span class="font-extrabold text-lg text-white">SkorinCPNS</span>
  </div>
  <nav class="flex-1 px-3 py-5 space-y-0.5 overflow-y-auto">
    <a href="dashboard.html" class="text-gray-400 hover:bg-white/10 hover:text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm transition">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a href="tryout-list.html" class="text-gray-400 hover:bg-white/10 hover:text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm transition">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
      Tryout
    </a>
    <a href="materi.html" class="bg-white/10 text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Materi
    </a>
    <a href="profil.html" class="text-gray-400 hover:bg-white/10 hover:text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm transition">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Profil
    </a>
  </nav>
  <div class="px-3 py-4 border-t border-white/10 flex-shrink-0">
    <div class="flex items-center gap-3 px-3 py-2 mb-1">
      <div id="sbAvatar" class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">?</div>
      <div class="min-w-0 flex-1">
        <div id="sbName" class="text-white text-sm font-semibold truncate">...</div>
        <div id="sbEmail" class="text-gray-400 text-xs truncate">...</div>
      </div>
    </div>
    <button onclick="doLogout()" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-red-400 hover:bg-red-500/10 hover:text-red-300 transition text-sm font-medium">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Keluar
    </button>
  </div>
</aside>
<div id="sbOverlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>
<div class="lg:hidden fixed top-0 inset-x-0 z-30 bg-white border-b border-gray-200 flex items-center h-14 px-4">
  <button onclick="openSidebar()" class="p-2 -ml-1 rounded-lg text-gray-500 hover:bg-gray-100 mr-3"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <span class="font-extrabold text-primary-600">SkorinCPNS</span>
</div>

<div class="lg:ml-64 min-h-screen bg-gray-50 pt-14 lg:pt-0">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-8">
    <h1 class="text-2xl font-black text-gray-900 mb-2">Materi Belajar SKD</h1>
    <p class="text-gray-500">Pelajari materi TWK, TIU, dan TKP secara terstruktur untuk memaksimalkan skor Anda.</p>
  </div>

  <!-- Category Tabs -->
  <div class="flex gap-2 mb-8 overflow-x-auto pb-1">
    <button onclick="filterKat('semua')" id="btn-semua" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-primary-600 text-white flex-shrink-0">Semua</button>
    <button onclick="filterKat('twk')" id="btn-twk" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">TWK</button>
    <button onclick="filterKat('tiu')" id="btn-tiu" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">TIU</button>
    <button onclick="filterKat('tkp')" id="btn-tkp" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">TKP</button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="materiGrid"></div>
</main>
</div>

<script>
  const { createClient } = supabase;
  const _sb = createClient('https://ykvwwfsoqqhtijtnivmj.supabase.co', 'sb_publishable_p_RYUHTiKlARg_rDTe3Gaw_N3G8XPwl');
  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.replace('login.html'); return; }
    const name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
    const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('sbAvatar').textContent = initials;
    document.getElementById('sbName').textContent = name;
    document.getElementById('sbEmail').textContent = session.user.email;
  })();
  async function doLogout() { await _sb.auth.signOut(); localStorage.removeItem('skorin_history'); window.location.href = 'index.html'; }
  function openSidebar() { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sbOverlay').classList.remove('hidden'); }
  function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sbOverlay').classList.add('hidden'); }

  const materiList = [
    // TWK
    {kat:'twk', icon:'🏛️', judul:'Pancasila & Ideologi Negara', desc:'Sejarah perumusan Pancasila, nilai-nilai setiap sila, dan penerapannya dalam kehidupan bernegara.', tersedia:true, level:'Dasar'},
    {kat:'twk', icon:'📜', judul:'UUD 1945 & Amandemen', desc:'Isi UUD 1945 beserta amandemen 1-4, hak dan kewajiban warga negara, serta kelembagaan negara.', tersedia:true, level:'Menengah'},
    {kat:'twk', icon:'🇮🇩', judul:'Sejarah Indonesia', desc:'Perjuangan kemerdekaan, orde lama, orde baru, reformasi, dan peristiwa penting bangsa Indonesia.', tersedia:true, level:'Dasar'},
    {kat:'twk', icon:'🤝', judul:'Bhinneka Tunggal Ika', desc:'Keberagaman SARA, toleransi, integrasi nasional, dan nilai-nilai persatuan bangsa.', tersedia:false, level:'Dasar'},
    {kat:'twk', icon:'🗺️', judul:'Wawasan Nusantara & NKRI', desc:'Konsep geopolitik Indonesia, wawasan nusantara, ketahanan nasional, dan otonomi daerah.', tersedia:false, level:'Menengah'},
    {kat:'twk', icon:'⚖️', judul:'Sistem Pemerintahan & Politik', desc:'Sistem pemerintahan Indonesia, pemilu, partai politik, dan lembaga-lembaga negara.', tersedia:false, level:'Lanjut'},
    // TIU
    {kat:'tiu', icon:'📖', judul:'Kemampuan Verbal', desc:'Sinonim, antonim, analogi kata, pemahaman wacana, dan logika verbal untuk soal TIU.', tersedia:true, level:'Dasar'},
    {kat:'tiu', icon:'🔢', judul:'Kemampuan Numerik', desc:'Aritmatika dasar, aljabar, statistika, deret angka, dan soal cerita matematika.', tersedia:true, level:'Menengah'},
    {kat:'tiu', icon:'🔷', judul:'Kemampuan Figural', desc:'Analogi gambar, seri gambar, pengelompokan gambar, dan kemampuan spasial.', tersedia:false, level:'Menengah'},
    {kat:'tiu', icon:'🧩', judul:'Logika & Penalaran', desc:'Silogisme, deduksi, induksi, dan berbagai jenis soal penalaran logis.', tersedia:false, level:'Lanjut'},
    {kat:'tiu', icon:'📐', judul:'Geometri & Pengukuran', desc:'Luas, keliling, volume bangun datar dan ruang, serta soal pengukuran terapan.', tersedia:false, level:'Dasar'},
    // TKP
    {kat:'tkp', icon:'🤲', judul:'Pelayanan Publik', desc:'Etika pelayanan publik, orientasi pelayanan prima, dan penanganan keluhan warga.', tersedia:true, level:'Dasar'},
    {kat:'tkp', icon:'🌐', judul:'Jejaring Kerja', desc:'Kerja sama tim, membangun hubungan profesional, komunikasi efektif di lingkungan kerja.', tersedia:true, level:'Dasar'},
    {kat:'tkp', icon:'🏡', judul:'Sosial Budaya', desc:'Kepekaan sosial, empati, kemampuan adaptasi dengan lingkungan sosial yang beragam.', tersedia:false, level:'Menengah'},
    {kat:'tkp', icon:'💻', judul:'Teknologi Informasi', desc:'Literasi digital, pemanfaatan TIK dalam pekerjaan, dan keamanan informasi dasar.', tersedia:false, level:'Dasar'},
    {kat:'tkp', icon:'🎯', judul:'Profesionalisme', desc:'Integritas, komitmen kerja, pengembangan diri, dan orientasi pada prestasi kerja.', tersedia:false, level:'Lanjut'},
    {kat:'tkp', icon:'🧠', judul:'Pengendalian Diri', desc:'Manajemen emosi, ketahanan menghadapi tekanan kerja, dan pengelolaan konflik.', tersedia:false, level:'Menengah'},
  ];

  let katAktif = 'semua';

  function filterKat(kat) {
    katAktif = kat;
    ['semua','twk','tiu','tkp'].forEach(k => {
      const el = document.getElementById('btn-'+k);
      el.className = `px-5 py-2.5 rounded-xl text-sm font-semibold flex-shrink-0 transition ${k===kat ? 'bg-primary-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
    });
    renderMateri();
  }

  function renderMateri() {
    const grid = document.getElementById('materiGrid');
    const filtered = katAktif === 'semua' ? materiList : materiList.filter(m => m.kat === katAktif);
    const katLabel = {twk:'TWK', tiu:'TIU', tkp:'TKP'};
    const katColor = {twk:'bg-blue-100 text-blue-700', tiu:'bg-green-100 text-green-700', tkp:'bg-amber-100 text-amber-700'};
    grid.innerHTML = filtered.map(m => `
      <div class="bg-white rounded-2xl border ${m.tersedia ? 'border-gray-100' : 'border-gray-100 opacity-80'} shadow-sm p-5 ${m.tersedia ? 'hover:border-primary-300 hover:shadow-md transition' : ''}">
        <div class="flex items-start justify-between mb-3">
          <div class="text-3xl">${m.icon}</div>
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold px-2.5 py-1 rounded-full ${katColor[m.kat]}">${katLabel[m.kat]}</span>
            ${m.tersedia ? '' : '<span class="bg-gray-100 text-gray-500 text-xs font-semibold px-2.5 py-1 rounded-full">Coming Soon</span>'}
          </div>
        </div>
        <h3 class="font-bold text-gray-900 mb-2">${m.judul}</h3>
        <p class="text-gray-500 text-sm leading-relaxed mb-4">${m.desc}</p>
        <div class="flex items-center justify-between">
          <span class="text-xs text-gray-400">Level: ${m.level}</span>
          ${m.tersedia
            ? `<button class="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition">Pelajari →</button>`
            : `<button disabled class="bg-gray-100 text-gray-400 text-xs font-semibold px-4 py-2 rounded-lg cursor-not-allowed">Segera Hadir</button>`}
        </div>
      </div>
    `).join('');
  }

  renderMateri();
</script>
</body>
</html>

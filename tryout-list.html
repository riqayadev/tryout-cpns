<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Tryout – SkorinCPNS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#eff6ff',100:'#dbeafe',600:'#2563eb',700:'#1d4ed8'}},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="font-sans antialiased bg-gray-50">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="dashboard.html" class="flex items-center gap-2 font-extrabold text-lg text-primary-600">
        <div class="w-7 h-7 bg-primary-600 rounded-lg flex items-center justify-center"><svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        SkorinCPNS
      </a>
      <div class="hidden md:flex items-center gap-1">
        <a href="dashboard.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">Dashboard</a>
        <a href="tryout-list.html" class="px-4 py-2 rounded-lg text-sm font-semibold bg-primary-50 text-primary-600">Tryout</a>
        <a href="materi.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">Materi</a>
        <a href="profil.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">Profil</a>
      </div>
      <a href="profil.html" id="avatarNav" class="w-8 h-8 bg-primary-600 rounded-full flex items-center justify-center text-white text-xs font-bold">?</a>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8">
  <div class="mb-8">
    <h1 class="text-2xl font-black text-gray-900 mb-2">Daftar Paket Tryout</h1>
    <p class="text-gray-500">Pilih paket tryout SKD yang sesuai dengan level persiapan Anda.</p>
  </div>

  <!-- Filter -->
  <div class="flex gap-2 mb-8 overflow-x-auto pb-1">
    <button onclick="setFilter('semua')" id="f-semua" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-primary-600 text-white flex-shrink-0">Semua</button>
    <button onclick="setFilter('gratis')" id="f-gratis" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">Gratis</button>
    <button onclick="setFilter('premium')" id="f-premium" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">Premium</button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="tryoutGrid"></div>
</main>

<!-- Bottom Nav Mobile -->
<nav class="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 z-40">
  <div class="grid grid-cols-4">
    <a href="dashboard.html" class="flex flex-col items-center py-3 text-gray-400"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span class="text-xs mt-0.5">Dashboard</span></a>
    <a href="tryout-list.html" class="flex flex-col items-center py-3 text-primary-600"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg><span class="text-xs mt-0.5 font-semibold">Tryout</span></a>
    <a href="materi.html" class="flex flex-col items-center py-3 text-gray-400"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span class="text-xs mt-0.5">Materi</span></a>
    <a href="profil.html" class="flex flex-col items-center py-3 text-gray-400"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span class="text-xs mt-0.5">Profil</span></a>
  </div>
</nav>

<script>
  const { createClient } = supabase;
  const _sb = createClient('https://ykvwwfsoqqhtijtnivmj.supabase.co', 'sb_publishable_p_RYUHTiKlARg_rDTe3Gaw_N3G8XPwl');
  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.replace('login.html'); return; }
    const name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
    document.getElementById('avatarNav').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  })();

  const pakets = [
    {id:1, judul:'SKD Simulasi #1', desc:'Tryout SKD lengkap dengan soal-soal tingkat mudah. Cocok untuk latihan pertama kali.', soal:110, durasi:100, level:'Mudah', tipe:'gratis', icon:'📝'},
    {id:2, judul:'SKD Simulasi #2', desc:'Kumpulan soal SKD tingkat menengah. Variasi soal lebih beragam dan menantang.', soal:110, durasi:100, level:'Menengah', tipe:'gratis', icon:'📋'},
    {id:3, judul:'SKD Simulasi #3', desc:'Soal berdasarkan kisi-kisi CPNS 2024. Latihan intensif dengan waktu tertekan.', soal:110, durasi:100, level:'Menengah', tipe:'gratis', icon:'📄'},
    {id:4, judul:'SKD Simulasi #4', desc:'Soal gabungan dari bank soal CPNS 3 tahun terakhir. Evaluasi kesiapan Anda.', soal:110, durasi:100, level:'Menengah', tipe:'gratis', icon:'🗒️'},
    {id:5, judul:'SKD Simulasi #5', desc:'Tryout gratis terakhir. Soal tingkat tinggi sebagai final assessment sebelum upgrade.', soal:110, durasi:100, level:'Sulit', tipe:'gratis', icon:'📑'},
    {id:6, judul:'SKD Premium #1', desc:'Bank soal premium eksklusif. Pembahasan super lengkap dengan referensi pasal dan sumber.', soal:110, durasi:100, level:'Sulit', tipe:'premium', icon:'💎'},
    {id:7, judul:'SKD Premium #2', desc:'Soal prediksi CPNS 2026 berdasarkan tren soal terkini. Cocok untuk persiapan final.', soal:110, durasi:100, level:'Sulit', tipe:'premium', icon:'🏆'},
    {id:8, judul:'SKD Premium #3', desc:'Paket intensif dengan passing rate tertinggi. Soal-soal divalidasi oleh ASN aktif.', soal:110, durasi:100, level:'Sangat Sulit', tipe:'premium', icon:'🎯'},
    {id:9, judul:'SKD Fokus TWK', desc:'Khusus latihan soal Tes Wawasan Kebangsaan. 110 soal murni TWK untuk pendalaman.', soal:110, durasi:100, level:'Menengah', tipe:'premium', icon:'🇮🇩'},
    {id:10, judul:'SKD Fokus TIU', desc:'Khusus latihan soal Tes Intelegensi Umum. Tingkatkan kemampuan verbal dan numerik.', soal:110, durasi:100, level:'Sulit', tipe:'premium', icon:'🧠'},
  ];

  let filterAktif = 'semua';

  function setFilter(f) {
    filterAktif = f;
    ['semua','gratis','premium'].forEach(k => {
      const el = document.getElementById('f-'+k);
      el.className = `px-5 py-2.5 rounded-xl text-sm font-semibold flex-shrink-0 transition ${k===f ? 'bg-primary-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
    });
    renderPakets();
  }

  function renderPakets() {
    const grid = document.getElementById('tryoutGrid');
    const filtered = filterAktif === 'semua' ? pakets : pakets.filter(p => p.tipe === filterAktif);
    const levelColor = {Mudah:'bg-green-100 text-green-700', Menengah:'bg-amber-100 text-amber-700', Sulit:'bg-red-100 text-red-700', 'Sangat Sulit':'bg-red-200 text-red-800'};

    grid.innerHTML = filtered.map(p => `
      <div class="bg-white rounded-2xl border ${p.tipe === 'premium' ? 'border-amber-200' : 'border-gray-100'} shadow-sm p-5 hover:shadow-md transition">
        <div class="flex items-start justify-between mb-3">
          <div class="text-3xl">${p.icon}</div>
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold px-2.5 py-1 rounded-full ${p.tipe === 'gratis' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${p.tipe.toUpperCase()}</span>
            <span class="text-xs font-medium px-2 py-1 rounded-full ${levelColor[p.level] || 'bg-gray-100 text-gray-600'}">${p.level}</span>
          </div>
        </div>
        <h3 class="font-bold text-gray-900 mb-1">${p.judul}</h3>
        <p class="text-gray-500 text-sm leading-relaxed mb-4">${p.desc}</p>
        <div class="flex items-center gap-4 text-xs text-gray-400 mb-4">
          <span>📝 ${p.soal} soal</span>
          <span>⏱️ ${p.durasi} menit</span>
          <span>📊 TWK·TIU·TKP</span>
        </div>
        ${p.tipe === 'gratis'
          ? `<a href="tryout.html?id=${p.id}&nama=${encodeURIComponent(p.judul)}" class="block w-full text-center bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-xl transition">Mulai Tryout →</a>`
          : `<button onclick="alertPremium()" class="w-full text-center bg-amber-400 hover:bg-amber-500 text-gray-900 font-bold py-3 rounded-xl transition">🔒 Upgrade untuk Akses</button>`}
      </div>
    `).join('');
  }

  function alertPremium() {
    alert('Paket Premium akan segera tersedia! Pantau terus SkorinCPNS untuk info upgrade.');
  }

  renderPakets();
</script>
</body>
</html>

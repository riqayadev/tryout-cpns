<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Tryout – SkorinCPNS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#eff6ff',100:'#dbeafe',600:'#2563eb',700:'#1d4ed8'}},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="font-sans antialiased bg-gray-50">

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-gray-900 flex flex-col z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
  <div class="flex items-center gap-3 px-5 h-16 border-b border-white/10 flex-shrink-0">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0"><svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
    <span class="font-extrabold text-lg text-white">SkorinCPNS</span>
  </div>
  <nav class="flex-1 px-3 py-5 space-y-0.5 overflow-y-auto">
    <a href="dashboard.html" class="text-gray-400 hover:bg-white/10 hover:text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm transition">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a href="tryout-list.html" class="bg-white/10 text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
      Tryout
    </a>
    <a href="materi.html" class="text-gray-400 hover:bg-white/10 hover:text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm transition">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Materi
    </a>
    <a href="profil.html" class="text-gray-400 hover:bg-white/10 hover:text-white flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm transition">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Profil
    </a>
  </nav>
  <div class="px-3 py-4 border-t border-white/10 flex-shrink-0">
    <div class="flex items-center gap-3 px-3 py-2 mb-1">
      <div id="sbAvatar" class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">?</div>
      <div class="min-w-0 flex-1">
        <div id="sbName" class="text-white text-sm font-semibold truncate">...</div>
        <div id="sbEmail" class="text-gray-400 text-xs truncate">...</div>
      </div>
    </div>
    <button onclick="doLogout()" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-red-400 hover:bg-red-500/10 hover:text-red-300 transition text-sm font-medium">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Keluar
    </button>
  </div>
</aside>
<div id="sbOverlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>
<div class="lg:hidden fixed top-0 inset-x-0 z-30 bg-white border-b border-gray-200 flex items-center h-14 px-4">
  <button onclick="openSidebar()" class="p-2 -ml-1 rounded-lg text-gray-500 hover:bg-gray-100 mr-3"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <span class="font-extrabold text-primary-600">SkorinCPNS</span>
</div>

<div class="lg:ml-64 min-h-screen bg-gray-50 pt-14 lg:pt-0">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-8">
    <h1 class="text-2xl font-black text-gray-900 mb-2">Daftar Paket Tryout</h1>
    <p class="text-gray-500">Pilih paket tryout SKD yang sesuai dengan level persiapan Anda.</p>
  </div>

  <!-- Filter -->
  <div class="flex gap-2 mb-8 overflow-x-auto pb-1">
    <button onclick="setFilter('semua')" id="f-semua" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-primary-600 text-white flex-shrink-0">Semua</button>
    <button onclick="setFilter('gratis')" id="f-gratis" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">Gratis</button>
    <button onclick="setFilter('premium')" id="f-premium" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 flex-shrink-0 transition">Premium</button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="tryoutGrid"></div>
</main>
</div>

<script>
  const { createClient } = supabase;
  const _sb = createClient('https://ykvwwfsoqqhtijtnivmj.supabase.co', 'sb_publishable_p_RYUHTiKlARg_rDTe3Gaw_N3G8XPwl');
  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.replace('login.html'); return; }
    const name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
    const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('sbAvatar').textContent = initials;
    document.getElementById('sbName').textContent = name;
    document.getElementById('sbEmail').textContent = session.user.email;
  })();
  async function doLogout() { await _sb.auth.signOut(); localStorage.removeItem('skorin_history'); window.location.href = 'index.html'; }
  function openSidebar() { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sbOverlay').classList.remove('hidden'); }
  function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sbOverlay').classList.add('hidden'); }

  const pakets = [
    {id:1, judul:'SKD Simulasi #1', desc:'Tryout SKD lengkap dengan soal-soal tingkat mudah. Cocok untuk latihan pertama kali.', soal:110, durasi:100, level:'Mudah', tipe:'gratis', icon:'📝'},
    {id:2, judul:'SKD Simulasi #2', desc:'Kumpulan soal SKD tingkat menengah. Variasi soal lebih beragam dan menantang.', soal:110, durasi:100, level:'Menengah', tipe:'gratis', icon:'📋'},
    {id:3, judul:'SKD Simulasi #3', desc:'Soal berdasarkan kisi-kisi CPNS 2024. Latihan intensif dengan waktu tertekan.', soal:110, durasi:100, level:'Menengah', tipe:'gratis', icon:'📄'},
    {id:4, judul:'SKD Simulasi #4', desc:'Soal gabungan dari bank soal CPNS 3 tahun terakhir. Evaluasi kesiapan Anda.', soal:110, durasi:100, level:'Menengah', tipe:'gratis', icon:'🗒️'},
    {id:5, judul:'SKD Simulasi #5', desc:'Tryout gratis terakhir. Soal tingkat tinggi sebagai final assessment sebelum upgrade.', soal:110, durasi:100, level:'Sulit', tipe:'gratis', icon:'📑'},
    {id:6, judul:'SKD Premium #1', desc:'Bank soal premium eksklusif. Pembahasan super lengkap dengan referensi pasal dan sumber.', soal:110, durasi:100, level:'Sulit', tipe:'premium', icon:'💎'},
    {id:7, judul:'SKD Premium #2', desc:'Soal prediksi CPNS 2026 berdasarkan tren soal terkini. Cocok untuk persiapan final.', soal:110, durasi:100, level:'Sulit', tipe:'premium', icon:'🏆'},
    {id:8, judul:'SKD Premium #3', desc:'Paket intensif dengan passing rate tertinggi. Soal-soal divalidasi oleh ASN aktif.', soal:110, durasi:100, level:'Sangat Sulit', tipe:'premium', icon:'🎯'},
    {id:9, judul:'SKD Fokus TWK', desc:'Khusus latihan soal Tes Wawasan Kebangsaan. 110 soal murni TWK untuk pendalaman.', soal:110, durasi:100, level:'Menengah', tipe:'premium', icon:'🇮🇩'},
    {id:10, judul:'SKD Fokus TIU', desc:'Khusus latihan soal Tes Intelegensi Umum. Tingkatkan kemampuan verbal dan numerik.', soal:110, durasi:100, level:'Sulit', tipe:'premium', icon:'🧠'},
  ];

  let filterAktif = 'semua';

  function setFilter(f) {
    filterAktif = f;
    ['semua','gratis','premium'].forEach(k => {
      const el = document.getElementById('f-'+k);
      el.className = `px-5 py-2.5 rounded-xl text-sm font-semibold flex-shrink-0 transition ${k===f ? 'bg-primary-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
    });
    renderPakets();
  }

  function renderPakets() {
    const grid = document.getElementById('tryoutGrid');
    const filtered = filterAktif === 'semua' ? pakets : pakets.filter(p => p.tipe === filterAktif);
    const levelColor = {Mudah:'bg-green-100 text-green-700', Menengah:'bg-amber-100 text-amber-700', Sulit:'bg-red-100 text-red-700', 'Sangat Sulit':'bg-red-200 text-red-800'};

    grid.innerHTML = filtered.map(p => `
      <div class="bg-white rounded-2xl border ${p.tipe === 'premium' ? 'border-amber-200' : 'border-gray-100'} shadow-sm p-5 hover:shadow-md transition">
        <div class="flex items-start justify-between mb-3">
          <div class="text-3xl">${p.icon}</div>
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold px-2.5 py-1 rounded-full ${p.tipe === 'gratis' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${p.tipe.toUpperCase()}</span>
            <span class="text-xs font-medium px-2 py-1 rounded-full ${levelColor[p.level] || 'bg-gray-100 text-gray-600'}">${p.level}</span>
          </div>
        </div>
        <h3 class="font-bold text-gray-900 mb-1">${p.judul}</h3>
        <p class="text-gray-500 text-sm leading-relaxed mb-4">${p.desc}</p>
        <div class="flex items-center gap-4 text-xs text-gray-400 mb-4">
          <span>📝 ${p.soal} soal</span>
          <span>⏱️ ${p.durasi} menit</span>
          <span>📊 TWK·TIU·TKP</span>
        </div>
        ${p.tipe === 'gratis'
          ? `<a href="tryout.html?id=${p.id}&nama=${encodeURIComponent(p.judul)}" class="block w-full text-center bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-xl transition">Mulai Tryout →</a>`
          : `<button onclick="alertPremium()" class="w-full text-center bg-amber-400 hover:bg-amber-500 text-gray-900 font-bold py-3 rounded-xl transition">🔒 Upgrade untuk Akses</button>`}
      </div>
    `).join('');
  }

  function alertPremium() {
    alert('Paket Premium akan segera tersedia! Pantau terus SkorinCPNS untuk info upgrade.');
  }

  renderPakets();
</script>
</body>
</html>
